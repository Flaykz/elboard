name: Commitlint

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - edited
    branches:
      - main
      - develop

permissions:
  contents: read

concurrency:
  group: commitlint-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  commitlint:
    name: Conventional commits
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate PR title
        run: |
          printf '%s\n' "${{ github.event.pull_request.title }}" | npx commitlint

      - name: Validate commits
        run: |
          npx commitlint \
            --from "${{ github.event.pull_request.base.sha }}" \
            --to "${{ github.event.pull_request.head.sha }}" \
            --verbose
