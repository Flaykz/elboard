name: Release

on:
  push:
    branches:
      - main
      - develop

permissions:
  contents: write
  issues: write
  pull-requests: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Semantic release and GHCR image
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.DEVELOP_SYNC_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify
        run: npm run ci

      - name: Temporarily disable branch protection for release commit
        env:
          GH_TOKEN: ${{ secrets.DEVELOP_SYNC_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          PROTECTION_FILE: ${{ runner.temp }}/branch-protection.json
          RESTORE_FILE: ${{ runner.temp }}/branch-protection-restore.json
        shell: bash
        run: |
          if [[ -z "${GH_TOKEN:-}" ]]; then
            echo "DEVELOP_SYNC_TOKEN is required to update protected release branches."
            exit 1
          fi

          gh api "repos/$GITHUB_REPOSITORY/branches/$GITHUB_REF_NAME/protection" > "$PROTECTION_FILE"

          jq '{
            required_status_checks: (
              if .required_status_checks == null then null
              else {
                strict: .required_status_checks.strict,
                contexts: (.required_status_checks.contexts // [])
              }
              end
            ),
            enforce_admins: (.enforce_admins.enabled // false),
            required_pull_request_reviews: (
              if .required_pull_request_reviews == null then null
              else {
                dismiss_stale_reviews: (.required_pull_request_reviews.dismiss_stale_reviews // false),
                require_code_owner_reviews: (.required_pull_request_reviews.require_code_owner_reviews // false),
                required_approving_review_count: (.required_pull_request_reviews.required_approving_review_count // 0),
                require_last_push_approval: (.required_pull_request_reviews.require_last_push_approval // false)
              }
              end
            ),
            restrictions: null,
            required_linear_history: (.required_linear_history.enabled // false),
            allow_force_pushes: (.allow_force_pushes.enabled // false),
            allow_deletions: (.allow_deletions.enabled // false),
            block_creations: (.block_creations.enabled // false),
            required_conversation_resolution: (.required_conversation_resolution.enabled // false),
            lock_branch: (.lock_branch.enabled // false),
            allow_fork_syncing: (.allow_fork_syncing.enabled // false)
          }' "$PROTECTION_FILE" > "$RESTORE_FILE"

          gh api -X DELETE "repos/$GITHUB_REPOSITORY/branches/$GITHUB_REF_NAME/protection"

      - name: Semantic release
        env:
          GITHUB_TOKEN: ${{ secrets.DEVELOP_SYNC_TOKEN || secrets.GITHUB_TOKEN }}
        run: npm run release

      - name: Restore branch protection
        if: ${{ always() }}
        env:
          GH_TOKEN: ${{ secrets.DEVELOP_SYNC_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          RESTORE_FILE: ${{ runner.temp }}/branch-protection-restore.json
        shell: bash
        run: |
          if [[ -z "${GH_TOKEN:-}" ]]; then
            echo "DEVELOP_SYNC_TOKEN is not configured; branch protection cannot be restored by this workflow."
            exit 1
          fi

          if [[ ! -s "$RESTORE_FILE" ]]; then
            echo "No branch protection backup found; nothing to restore."
            exit 0
          fi

          gh api -X PUT \
            "repos/$GITHUB_REPOSITORY/branches/$GITHUB_REF_NAME/protection" \
            --input "$RESTORE_FILE"

      - name: Sync stable release commit to develop
        if: github.ref_name == 'main' && env.RELEASE_VERSION != ''
        env:
          GH_TOKEN: ${{ secrets.DEVELOP_SYNC_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          RELEASE_VERSION: ${{ env.RELEASE_VERSION }}
        shell: bash
        run: |
          if [[ -z "${GH_TOKEN:-}" ]]; then
            echo "DEVELOP_SYNC_TOKEN is required to sync the stable release commit to develop."
            exit 1
          fi

          develop_protection_file="$RUNNER_TEMP/develop-protection.json"
          develop_restore_file="$RUNNER_TEMP/develop-protection-restore.json"

          restore_develop_protection() {
            if [[ -s "$develop_restore_file" ]]; then
              gh api -X PUT \
                "repos/$GITHUB_REPOSITORY/branches/develop/protection" \
                --input "$develop_restore_file" >/dev/null || true
            fi
          }
          trap restore_develop_protection EXIT

          gh api "repos/$GITHUB_REPOSITORY/branches/develop/protection" > "$develop_protection_file"

          jq '{
            required_status_checks: (
              if .required_status_checks == null then null
              else {
                strict: .required_status_checks.strict,
                contexts: (.required_status_checks.contexts // [])
              }
              end
            ),
            enforce_admins: (.enforce_admins.enabled // false),
            required_pull_request_reviews: (
              if .required_pull_request_reviews == null then null
              else {
                dismiss_stale_reviews: (.required_pull_request_reviews.dismiss_stale_reviews // false),
                require_code_owner_reviews: (.required_pull_request_reviews.require_code_owner_reviews // false),
                required_approving_review_count: (.required_pull_request_reviews.required_approving_review_count // 0),
                require_last_push_approval: (.required_pull_request_reviews.require_last_push_approval // false)
              }
              end
            ),
            restrictions: null,
            required_linear_history: (.required_linear_history.enabled // false),
            allow_force_pushes: (.allow_force_pushes.enabled // false),
            allow_deletions: (.allow_deletions.enabled // false),
            block_creations: (.block_creations.enabled // false),
            required_conversation_resolution: (.required_conversation_resolution.enabled // false),
            lock_branch: (.lock_branch.enabled // false),
            allow_fork_syncing: (.allow_fork_syncing.enabled // false)
          }' "$develop_protection_file" > "$develop_restore_file"

          gh api -X DELETE "repos/$GITHUB_REPOSITORY/branches/develop/protection"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin main develop
          release_sha="$(git rev-parse origin/main)"

          git switch --detach origin/develop
          git checkout "$release_sha" -- package.json package-lock.json

          if git diff --quiet -- package.json package-lock.json; then
            git commit --allow-empty \
              -m "chore(release): sync main release $RELEASE_VERSION [skip ci]" \
              -m "Main release commit: $release_sha"
          else
            git add package.json package-lock.json
            git commit \
              -m "chore(release): sync main release $RELEASE_VERSION [skip ci]" \
              -m "Main release commit: $release_sha"
          fi

          git push \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            HEAD:develop

      - name: Delete obsolete GitHub prereleases after stable release
        if: github.ref_name == 'main' && env.RELEASE_VERSION != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          prereleases="$(gh api "repos/$GH_REPO/releases?per_page=100" --paginate --jq '.[] | select(.prerelease == true) | [.id, .tag_name] | @tsv')"

          if [[ -z "$prereleases" ]]; then
            echo "No prereleases to delete."
            exit 0
          fi

          while IFS=$'\t' read -r id tag_name; do
            [[ -z "$id" ]] && continue
            echo "Deleting prerelease id $id"
            gh api -X DELETE "repos/$GH_REPO/releases/$id"

            if [[ -n "$tag_name" ]]; then
              echo "Deleting prerelease tag $tag_name"
              gh api -X DELETE "repos/$GH_REPO/git/refs/tags/$tag_name" || true
            fi
          done <<< "$prereleases"

      - name: Setup Docker Buildx
        if: env.RELEASE_VERSION != ''
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        if: env.RELEASE_VERSION != ''
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        if: env.RELEASE_VERSION != ''
        env:
          RELEASE_VERSION: ${{ env.RELEASE_VERSION }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_SHA: ${{ github.sha }}
        shell: bash
        run: |
          image="ghcr.io/$(echo "$GITHUB_REPOSITORY" | tr '[:upper:]' '[:lower:]')"
          short_sha="${GITHUB_SHA::7}"
          tags=(
            "--tag" "$image:$RELEASE_VERSION"
            "--tag" "$image:sha-$short_sha"
          )

          if [[ "$GITHUB_REF_NAME" == "main" ]]; then
            tags+=("--tag" "$image:latest")
          else
            tags+=("--tag" "$image:develop")
          fi

          docker buildx build \
            --push \
            --label "org.opencontainers.image.source=https://github.com/$GITHUB_REPOSITORY" \
            --label "org.opencontainers.image.revision=$GITHUB_SHA" \
            --label "org.opencontainers.image.version=$RELEASE_VERSION" \
            "${tags[@]}" \
            .
